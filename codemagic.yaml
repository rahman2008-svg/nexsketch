workflows:
  nexsketch_release:
    name: NexSketch Art Studio Release
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      vars:
        PACKAGE_NAME: "com.aistudio.nexsketch.artstudio"
        JAVA_HOME: /Library/Java/JavaVirtualMachines/zulu-17.jdk/Contents/Home

      android_signing:
        - nexsketch_keystore

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: Set up local properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant permission
        script: |
          chmod +x ./gradlew

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Build Release AAB
        script: |
          ./gradlew bundleRelease

    artifacts:
      - app/build/outputs/**/*.aab
      - app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - progamer32313@gmail.com
