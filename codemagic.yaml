workflows:
  nexsketch_release:
    name: NexSketch Art Studio Release

    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      java: 17

      android_signing:
        - nexsketch_keystore

      vars:
        PACKAGE_NAME: com.aistudio.nexsketch.artstudio

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: Checkout
        script: |
          echo "Starting NexSketch build..."

      - name: Set Android SDK
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Grant permission
        script: |
          chmod +x ./gradlew

      - name: Clean project
        script: |
          ./gradlew clean

      - name: Build Release AAB
        script: |
          ./gradlew bundleRelease

    artifacts:
      - app/build/outputs/**/*.aab
      - app/build/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - progamer32313@gmail.com
